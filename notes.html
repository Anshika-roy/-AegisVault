<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AegisVault - Victim Notes</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-2xl px-4 py-8">
    <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-6 shadow-xl shadow-sky-900/20">
      <div class="flex items-center justify-between gap-3">
        <div>
          <h1 class="text-xl font-semibold">Victim Safe Notes</h1>
          <p class="text-sm text-slate-400">Stealth view with legal-sharing controls.</p>
        </div>
        <button id="signout-button" class="rounded-lg border border-slate-600 px-3 py-2 text-xs text-slate-200 hover:bg-slate-800">Sign Out</button>
      </div>

      <div class="mt-6 rounded-xl border border-slate-700 bg-slate-950 p-4">
        <label class="flex cursor-pointer items-center justify-between">
          <span class="text-sm font-medium">Grant Legal Access</span>
          <input id="share-toggle" type="checkbox" class="h-5 w-5 accent-sky-500" />
        </label>
        <p class="mt-2 text-xs text-slate-400">When enabled, your shared evidence becomes visible to lawyers in live feed.</p>
      </div>

      <div class="mt-4 rounded-xl border border-slate-800 bg-slate-900 p-4">
        <div class="text-xs uppercase tracking-wider text-slate-500">Notes</div>
        <button id="secret-note" type="button" class="mt-2 w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-left text-sm text-slate-300 hover:border-slate-600">
          Grocery list: milk, bread, medicine
        </button>
      </div>

      <div id="notes-status" class="mt-4 rounded-lg border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-slate-300">Loading profile...</div>
    </div>
  </main>

  <script type="module" src="./notes.js"></script>
</body>
</html>
