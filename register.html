<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AegisVault - Register</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-md px-4 py-10">
    <div class="rounded-2xl border border-slate-800 bg-slate-900/80 p-6 shadow-2xl shadow-sky-900/20">
      <h1 class="text-2xl font-semibold tracking-tight">AegisVault Registration</h1>
      <p class="mt-2 text-sm text-slate-400">Create a secure account for Client or Lawyer access.</p>

      <form id="register-form" class="mt-6 space-y-4">
        <div>
          <label class="mb-1 block text-sm text-slate-300" for="name">Name</label>
          <input id="name" type="text" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:border-sky-500" />
        </div>
        <div>
          <label class="mb-1 block text-sm text-slate-300" for="email">Email</label>
          <input id="email" type="email" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:border-sky-500" />
        </div>
        <div>
          <label class="mb-1 block text-sm text-slate-300" for="password">Password</label>
          <input id="password" type="password" minlength="6" required class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2 text-sm outline-none focus:border-sky-500" />
        </div>

        <div>
          <label class="mb-2 block text-sm text-slate-300">Role</label>
          <div class="grid grid-cols-2 gap-2">
            <button type="button" data-role="client" class="role-btn rounded-lg border border-sky-300 bg-sky-500 px-3 py-2 text-sm text-white">Client</button>
            <button type="button" data-role="lawyer" class="role-btn rounded-lg border border-slate-600 bg-slate-800/80 px-3 py-2 text-sm text-slate-200">Lawyer</button>
          </div>
          <input id="role" type="hidden" value="client" />
        </div>

        <button id="register-submit" type="submit" class="w-full rounded-lg bg-sky-500 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-400 disabled:cursor-not-allowed disabled:opacity-60">Create Account</button>
      </form>

      <div id="register-status" class="mt-4 rounded-lg border border-slate-700 bg-slate-950 px-4 py-3 text-sm text-slate-300">Awaiting registration...</div>

      <p class="mt-4 text-center text-sm text-slate-400">
        Already registered?
        <a href="./login.html" class="text-sky-400 hover:text-sky-300">Login</a>
      </p>

      <div id="server-warning" class="mt-3 hidden rounded-lg border border-amber-500/40 bg-amber-950/50 px-4 py-3 text-xs text-amber-200">
        Open this page through the local server, not as a direct file. Use: http://127.0.0.1:5500/register.html
      </div>
    </div>
  </main>

  <script>
    if (window.location.protocol === "file:") {
      const warning = document.getElementById("server-warning");
      if (warning) {
        warning.classList.remove("hidden");
      }
    }
  </script>
  <script type="module" src="./register.js"></script>
</body>
</html>
